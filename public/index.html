<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcrição AssemblyAI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Transcrição AssemblyAI</h1>

    <div id="dropZone" class="drop-zone">
        <span class="drop-zone__prompt">Arraste o áudio aqui ou clique para selecionar</span>
        <input type="file" id="audioInput" name="audio" accept="audio/*" class="drop-zone__input">
    </div>

    <div class="actions">
        <button id="transcreverBtn">Transcrever Áudio</button>
    </div>

<div id="statusContainer" class="status-container hidden">
    <div id="statusSpinner" class="spinner-small"></div>
    <div id="successIcon" class="success-icon hidden"></div>
    <p id="statusText">Aguardando início...</p>
</div>

    <div id="resultado">
        <div id="loader" class="loader hidden"></div>
        <div id="textoResultado">
            <p class="placeholder-text">O resultado da transcrição aparecerá aqui...</p>
        </div>
    </div>

    <hr>

    <h2>Substituições que exigem letras maiúsculas no começo</h2>
    <div class="dict-form">
        <input type="text" id="fixedFrom" placeholder="De">
        <input type="text" id="fixedTo" placeholder="Para">
        <button onclick="addRule('fixed')">Adicionar</button>
    </div>

    <table border="1" id="fixedTable">
        <thead>
            <tr>
                <th>De</th>
                <th>Para</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>Demais Substituições</h2>
    <div class="dict-form">
        <input type="text" id="normalizeFrom" placeholder="De">
        <input type="text" id="normalizeTo" placeholder="Para">
        <button onclick="addRule('normalize')">Adicionar</button>
    </div>

    <table border="1" id="normalizeTable">
        <thead>
            <tr>
                <th>De</th>
                <th>Para</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="app.js"></script>
    <script>
        // Manter as funções loadDictionary, addRule e deleteRule que já existem
    </script>
</body>
</html>
